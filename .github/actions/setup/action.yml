name: 'Setup Environment'
description: 'Checkout, install Foundry, and install dependencies with caching'

inputs:
  install-pnpm:
    description: 'Whether to install pnpm dependencies'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # ────────────────────────────────────────────────────────────────────────────
    # Foundry
    # ────────────────────────────────────────────────────────────────────────────
    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: stable
        cache: true

    - name: Show Forge version
      shell: bash
      run: forge --version

    # ────────────────────────────────────────────────────────────────────────────
    # Soldeer Dependencies
    # ────────────────────────────────────────────────────────────────────────────
    - name: Cache Soldeer dependencies
      uses: actions/cache@v4
      with:
        path: dependencies
        key: soldeer-${{ hashFiles('soldeer.lock') }}
        restore-keys: soldeer-

    - name: Install Soldeer dependencies
      shell: bash
      run: forge soldeer install

    # ────────────────────────────────────────────────────────────────────────────
    # pnpm Dependencies (optional)
    # ────────────────────────────────────────────────────────────────────────────
    - name: Install pnpm
      if: inputs.install-pnpm == 'true'
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Setup Node.js
      if: inputs.install-pnpm == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install pnpm dependencies
      if: inputs.install-pnpm == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
